<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/navigation :: navigation}"></div>
<div class="container">
    <form class="mt-3" th:action="@{/candidates/create}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="name" class="form-label"><b>Name</b></label>
            <input type="text" class="form-control" name="name" id="name"
                   placeholder="Enter your name, for example, John Smith">
        </div>
        <div class="mb-3">
            <label for="formFile"><b>Photo</b></label>
            <input class="form-control form-control-sm w-100" type="file" id="formFile" name="file" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label"><b>Description</b></label>
            <textarea class="form-control" name="description" id="description" rows="25"
                      placeholder="Describe your skills, experience, and qualifications"></textarea>
        </div>
        <div class="mb-3">
            <label for="city"><b>City</b></label>
            <select class="form-control" id="city" name="city">
                <option th:each="city : ${cities}" th:value="${city.id}" th:text="${city.name}"></option>
            </select>
        </div>
        <div class="mb-3 row">
            <div class="col-6"></div>
            <div class="col-6">
                <div class="row">
                    <div class="col-6"><a class="btn btn-danger w-100"
                                          th:href="@{candidates}">Cancel</a></div>
                    <div class="col-6"><button class="btn btn-primary w-100"
                                               type="submit">Save</button></div>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>
